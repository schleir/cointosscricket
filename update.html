<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TossIPL - Update Match Data</title>
  <style>
    :root { --bg: #0a0a0f; --card: #141420; --text: #f0f0f5; --muted: #8888aa; --accent: #00d4aa; --border: #2a2a3e; --danger: #ff4466; --warning: #ffaa00; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { color: var(--accent); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .card p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
    button { padding: 10px 24px; border-radius: 8px; border: none; font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); margin-left: 8px; }
    .token-input { width: 100%; padding: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-family: monospace; margin: 8px 0; }
    .token-input:focus { outline: none; border-color: var(--accent); }
    .status { padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-top: 12px; }
    .status.success { background: rgba(0,212,170,0.1); color: var(--accent); }
    .status.error { background: rgba(255,68,102,0.1); color: var(--danger); }
    .status.info { background: rgba(136,136,170,0.1); color: var(--muted); }
    .status.running { background: rgba(255,170,0,0.1); color: var(--warning); }
    .log { margin-top: 12px; max-height: 300px; overflow: auto; font-family: monospace; font-size: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .log-line { padding: 2px 0; }
    .log-line.ok { color: var(--accent); }
    .log-line.err { color: var(--danger); }
    .log-line.warn { color: var(--warning); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--warning); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: var(--accent); }
    code { background: rgba(0,212,170,0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
    .hidden { display: none; }
  </style>
</head>
<body>

<h1>Toss<span>IPL</span> — Update Data</h1>
<p class="subtitle">Triggers the update script to fetch latest IPL results from ESPN CricInfo.</p>

<!-- Token setup -->
<div class="card" id="card-token">
  <div class="card-title">GitHub Token</div>
  <p>Enter a <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=TossIPL%20Update" target="_blank">Personal Access Token</a> with <code>repo</code> + <code>workflow</code> scope. Stored in your browser only.</p>
  <input type="password" class="token-input" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
  <div>
    <button class="btn-primary" id="btn-run" onclick="triggerUpdate()">Update Now</button>
  </div>
  <div id="status"></div>
</div>

<!-- Log output -->
<div class="card hidden" id="card-log">
  <div class="card-title">Progress</div>
  <div class="log" id="log"></div>
</div>

<script>
(function() {
  var OWNER = 'schleir';
  var REPO = 'cointosscricket';
  var WORKFLOW = 'update-data.yml';
  var BRANCH = 'gh-pages';
  var pollTimer = null;

  // Restore saved token
  var saved = localStorage.getItem('tossipl_github_token');
  if (saved) document.getElementById('github-token').value = saved;

  function setStatus(cls, html) {
    var el = document.getElementById('status');
    el.className = 'status ' + cls;
    el.innerHTML = html;
  }

  function log(msg, cls) {
    var el = document.getElementById('card-log');
    el.classList.remove('hidden');
    var logEl = document.getElementById('log');
    var line = document.createElement('div');
    line.className = 'log-line' + (cls ? ' ' + cls : '');
    line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function getToken() {
    var token = document.getElementById('github-token').value.trim();
    if (!token) {
      setStatus('error', 'Please enter a GitHub token.');
      return null;
    }
    localStorage.setItem('tossipl_github_token', token);
    return token;
  }

  function ghFetch(path, opts) {
    var token = getToken();
    if (!token) return Promise.reject(new Error('No token'));
    opts = opts || {};
    opts.headers = Object.assign({
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github.v3+json',
    }, opts.headers || {});
    return fetch('https://api.github.com' + path, opts).then(function(r) {
      if (!r.ok) return r.json().then(function(b) { throw new Error(b.message || r.status); });
      if (r.status === 204) return null;
      return r.json();
    });
  }

  window.triggerUpdate = function() {
    var token = getToken();
    if (!token) return;

    document.getElementById('btn-run').disabled = true;
    document.getElementById('log').innerHTML = '';
    setStatus('running', '<span class="spinner"></span> Triggering workflow...');
    log('Dispatching update-data workflow...');

    ghFetch('/repos/' + OWNER + '/' + REPO + '/actions/workflows/' + WORKFLOW + '/dispatches', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: BRANCH })
    })
    .then(function() {
      log('Workflow dispatched. Waiting for it to start...', 'ok');
      setStatus('running', '<span class="spinner"></span> Workflow dispatched, waiting for run to appear...');
      // Wait a few seconds then start polling
      setTimeout(function() { pollForRun(token, 0); }, 3000);
    })
    .catch(function(err) {
      log('Failed to dispatch: ' + err.message, 'err');
      setStatus('error', 'Failed: ' + err.message + '. Check your token has <code>workflow</code> scope.');
      document.getElementById('btn-run').disabled = false;
    });
  };

  function pollForRun(token, attempt) {
    if (attempt > 60) {
      log('Timed out waiting for workflow.', 'err');
      setStatus('error', 'Timed out.');
      document.getElementById('btn-run').disabled = false;
      return;
    }

    ghFetch('/repos/' + OWNER + '/' + REPO + '/actions/workflows/' + WORKFLOW + '/runs?per_page=1&branch=' + BRANCH)
    .then(function(data) {
      if (!data.workflow_runs || data.workflow_runs.length === 0) {
        log('No runs found yet, retrying...', 'warn');
        setTimeout(function() { pollForRun(token, attempt + 1); }, 5000);
        return;
      }

      var run = data.workflow_runs[0];
      var status = run.status;
      var conclusion = run.conclusion;

      if (status === 'completed') {
        if (conclusion === 'success') {
          log('Workflow completed successfully!', 'ok');
          setStatus('success', 'Data updated! The site will refresh in ~1 minute. <a href="index.html">Go to TossIPL</a>');
        } else {
          log('Workflow finished with: ' + conclusion, 'err');
          setStatus('error', 'Workflow ' + conclusion + '. <a href="' + run.html_url + '" target="_blank">View logs</a>');
        }
        document.getElementById('btn-run').disabled = false;
        return;
      }

      // Still running
      var label = status === 'queued' ? 'Queued' : status === 'in_progress' ? 'Running' : status;
      log('Status: ' + label + '...', 'warn');
      setStatus('running', '<span class="spinner"></span> ' + label + '... <a href="' + run.html_url + '" target="_blank">View</a>');
      setTimeout(function() { pollForRun(token, attempt + 1); }, 5000);
    })
    .catch(function(err) {
      log('Poll error: ' + err.message, 'err');
      setTimeout(function() { pollForRun(token, attempt + 1); }, 5000);
    });
  }

  // Auto-trigger if token is already saved
  if (saved) {
    // Small delay so user sees the page first
    setTimeout(function() {
      triggerUpdate();
    }, 500);
  }

})();
</script>
</body>
</html>
