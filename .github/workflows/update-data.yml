name: Update IPL Match Data

on:
  workflow_dispatch:
  schedule:
    # During IPL (Mar-May): every 5 minutes during match hours (2PM-7PM UTC = 7:30PM-12:30AM IST)
    - cron: '*/5 14-19 * 3-5 *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch and update match data
        run: node scripts/update-data.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "TossIPL Bot"
          git config user.email "bot@tossipl.com"
          git add data/
          git commit -m "Auto-update IPL match data ($(date -u +%Y-%m-%d))"
          git push
