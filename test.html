<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting to TossIPL Test Mode...</title>
  <script>
    // Redirect to index.html with test mode enabled, preserving other params
    var params = new URLSearchParams(window.location.search);
    params.set('mode', 'test');
    window.location.replace('index.html?' + params.toString());
  </script>
</head>
<body>
  <p>Redirecting to <a href="index.html?mode=test">TossIPL Test Mode</a>...</p>
</body>
</html>
