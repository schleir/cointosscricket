<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting to TossIPL Test Mode...</title>
  <script>
    // Redirect to index.html with n param (presence of n = test mode)
    var params = new URLSearchParams(window.location.search);
    if (!params.has('n')) params.set('n', '');
    window.location.replace('index.html?' + params.toString());
  </script>
</head>
<body>
  <p>Redirecting to <a href="index.html?mode=test">TossIPL Test Mode</a>...</p>
</body>
</html>
